name: Release Rust CLI

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.0.4)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: chartlir-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: chartlir-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: chartlir-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: chartlir-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: chartlir-win32-x64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Rename binary
        shell: bash
        run: |
          src="rust/target/${{ matrix.target }}/release/chartli"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            src="${src}.exe"
          fi
          cp "$src" "${{ matrix.name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble npm package
        run: |
          mkdir -p rust/npm/binaries
          for dir in artifacts/*/; do
            cp "$dir"/* rust/npm/binaries/
          done
          chmod +x rust/npm/binaries/chartlir-* 2>/dev/null || true
          cd rust/npm
          npm version "${{ github.event.inputs.version }}" --no-git-tag-version --allow-same-version

      - name: Publish
        working-directory: rust/npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
